name: Validate Yumeno

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
          ASTRO_SITE: https://example.github.io
          ASTRO_BASE: /Yumeno
      - run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
          ASTRO_SITE: https://example.github.io
          ASTRO_BASE: /Yumeno
      - run: npm run format:check
